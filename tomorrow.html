<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>TOMORROW - Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #17212b; color: #f5f6f7; }
        .tg-card { background-color: #202b36; border: 1px solid #2b394a; }
    </style>
</head>
<body class="p-3 min-h-screen">
    <div class="flex items-center justify-between mb-4 pb-2 border-b border-gray-800">
        <h1 class="text-sm font-bold uppercase tracking-wider text-sky-400">📅 TOMORROW'S FORECASTS</h1>
        <span class="text-xs text-gray-400 font-mono">24 May</span>
    </div>

    <div class="space-y-3">
        <div class="tg-card p-3 rounded-xl">
            <h4 class="font-bold text-sm mb-1">Manchester United vs Liverpool</h4>
            <p class="text-xs text-gray-400">Tip: Away Win & Both Teams to Score. Total Combined Odds: 3.40.</p>
        </div>
    </div>
</body>
</html>
