<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>YESTERDAY - Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #17212b; color: #f5f6f7; }
        .tg-card { background-color: #202b36; border: 1px solid #2b394a; }
    </style>
</head>
<body class="p-3 min-h-screen">
    <div class="flex items-center justify-between mb-4 pb-2 border-b border-gray-800">
        <h1 class="text-sm font-bold uppercase tracking-wider text-green-400">✅ YESTERDAY'S RESULTS</h1>
        <span class="text-xs text-gray-400 font-mono">22 May</span>
    </div>

    <div class="space-y-3">
        <div class="tg-card p-3 rounded-xl border-l-4 border-green-500">
            <h4 class="font-bold text-sm mb-1 text-white">Chelsea vs Arsenal</h4>
            <div class="flex justify-between text-xs text-gray-400">
                <span>Tip: Over 1.5 Goals (2-2 FT)</span>
                <span class="text-green-400 font-bold">WON</span>
            </div>
        </div>
    </div>
</body>
</html>
